<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Studio // Interactive</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial;
    background: black;
    color: white;
    overflow: hidden;
  }

  /* ===== 背景光影 ===== */
  .bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 20% 20%, #1b2a4a, transparent 40%),
                radial-gradient(circle at 80% 30%, #3a1b4a, transparent 45%),
                radial-gradient(circle at 50% 80%, #0f3a2e, transparent 45%);
    filter: blur(50px);
    animation: drift 16s ease-in-out infinite alternate;
    transform: scale(1.2);
  }

  @keyframes drift {
    0% { transform: scale(1.2) translate(0,0); }
    100% { transform: scale(1.25) translate(30px,-20px); }
  }

  /* ===== 主容器 ===== */
  .scene {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .panel {
    width: 720px;
    padding: 42px;
    border-radius: 24px;

    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(22px);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 30px 90px rgba(0,0,0,0.6);
  }

  /* ===== 标题 ===== */
  .title {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .subtitle {
    opacity: 0.7;
    margin-bottom: 30px;
  }

  /* ===== 叙事文本 ===== */
  .story {
    font-size: 16px;
    line-height: 1.8;
    min-height: 80px;
    opacity: 0.9;
  }

  /* ===== 选项按钮 ===== */
  .choices {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  button {
    text-align: left;
    padding: 14px 16px;
    border-radius: 12px;

    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);

    color: white;
    cursor: pointer;
    font-size: 14px;

    transition: 0.25s ease;
  }

  button:hover {
    background: rgba(255,255,255,0.12);
    transform: translateX(6px);
  }

  /* ===== 小提示 UI（DBH风格）===== */
  .hint {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.5;
  }

  .fade {
    transition: opacity 0.4s ease;
  }
</style>
</head>

<body>

<div class="bg"></div>

<div class="scene">
  <div class="panel">

    <div class="title">Studio Interface</div>
    <div class="subtitle">Interactive Narrative System</div>

    <div id="story" class="story fade"></div>

    <div class="choices">

      <button onclick="route('vision')">
        ▶ 查看工作室宗旨
      </button>

      <button onclick="route('contact')">
        ▶ 联系方式入口
      </button>

      <button onclick="route('exit')">
        ▶ 离开系统
      </button>

    </div>

    <div class="hint">
      Select a node to continue the narrative
    </div>

  </div>
</div>

<script>
  const story = document.getElementById("story");

  const nodes = {
    home: "系统已启动。你进入一个未定义的叙事空间。",
    
    vision: "“让每个人能沉浸在未有的生活中”\n\nBe Rest, And Enjoy Your Life\n\n这里不是产品，而是一种状态。",
    
    contact: "Sakura\nSakura956904363@outlook.com\n\n系统记录：通讯通道已开放。",
    
    exit: "连接终止。\n但叙事仍在后台运行。"
  };

  function typeText(text, el) {
    el.innerHTML = "";
    let i = 0;

    function step() {
      if (i < text.length) {
        el.innerHTML += text[i] === "\n" ? "<br/>" : text[i];
        i++;
        setTimeout(step, 18);
      }
    }

    step();
  }

  function route(node) {
    story.classList.remove("fade");
    story.style.opacity = 0.2;

    setTimeout(() => {
      typeText(nodes[node], story);
      story.style.opacity = 1;
      story.classList.add("fade");
    }, 250);
  }

  // init
  route("home");
</script>

</body>
</html>
