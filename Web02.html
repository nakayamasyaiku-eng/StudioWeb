<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sakura's Dream Studio</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", Arial, sans-serif;
    background: #050a14; /* 更深的蓝黑底色 */
    color: white;
    overflow: hidden;
  }

  /* ===== 背景光影 (增加蓝/白，降低紫) ===== */
  .bg {
    position: fixed;
    inset: 0;
    /* 主要使用深蓝、灰蓝和冰蓝色 */
    background: radial-gradient(circle at 20% 20%, #0a2540, transparent 45%),
                radial-gradient(circle at 80% 30%, #172a3a, transparent 40%),
                radial-gradient(circle at 50% 80%, #1e3c5a, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(255,255,255,0.03), transparent 30%);
    filter: blur(60px);
    animation: drift 18s ease-in-out infinite alternate;
    transform: scale(1.2);
  }

  @keyframes drift {
    0% { transform: scale(1.2) translate(0,0); }
    100% { transform: scale(1.25) translate(30px,-20px); }
  }

  /* ===== 主容器 (左右布局) ===== */
  .scene {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .panel {
    display: flex;
    flex-direction: row;
    width: 860px;
    height: 480px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 30px 90px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(255,255,255,0.02);
    overflow: hidden;
  }

  /* ===== 左侧边栏 ===== */
  .sidebar {
    width: 280px;
    padding: 40px 30px;
    background: rgba(0, 0, 0, 0.2);
    border-right: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    flex-direction: column;
  }

  .title {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
    text-shadow: 0 0 10px rgba(255,255,255,0.2);
  }

  .subtitle {
    font-size: 12px;
    opacity: 0.6;
    letter-spacing: 1px;
    margin-bottom: 40px;
    text-transform: uppercase;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex-grow: 1;
  }

    padding: 12px 16px;
